# Symphony — Multi-project Docker Compose
#
# Usage:
#   1. Copy .env.example to .env and fill in credentials
#   2. Put your WORKFLOW.md in the workflow/ directory
#   3. docker compose up -d

services:
  symphony:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: symphony-agent
    env_file: .env
    environment:
      - LINEAR_API_KEY=${LINEAR_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GH_TOKEN=${GH_TOKEN:-}
    ports:
      - "${SYMPHONY_PORT:-4000}:4000"
    volumes:
      - ./workflow:/workflow:ro
      - symphony-workspaces:/workspaces
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-1}"
          memory: "${MEMORY_LIMIT:-2g}"

volumes:
  symphony-workspaces:
